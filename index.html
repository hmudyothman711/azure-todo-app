<!DOCTYPE html>
<html>
<head>
    <title>Azure To-Do App</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
            background:#f2f2f2;
        }

        h1{
            color:#0078D7;
        }

        input{
            padding:10px;
            width:250px;
        }

        button{
            padding:10px;
            background:#0078D7;
            color:white;
            border:none;
        }

        li{
            margin:10px;
            list-style:none;
        }
    </style>
</head>
<body>

<h1>Azure CI/CD To-Do App</h1>

<input type="text" id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask(){
    let task=document.getElementById("task").value;

    if(task!=""){
        let li=document.createElement("li");
        li.innerText=task;
        document.getElementById("list").appendChild(li);

        document.getElementById("task").value="";
    }
}
</script>

</body>
</html>
